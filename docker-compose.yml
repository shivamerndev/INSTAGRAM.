services:
  backend:
    build: ./server
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev


volumes:
  backend_node_modules:
  frontend_node_modules: